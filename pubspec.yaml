name: smart_itinerary_planner
description: AI-powered Smart Itinerary Planner and Tour Guide for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2

  # Google Sign In
  google_sign_in: ^7.2.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.4

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.3.3
  flutter_rating_bar: ^4.0.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^13.1.0
  image_picker: ^1.0.4
  path_provider: ^2.1.1

  # PDF
  pdf: ^3.10.7
  printing: ^5.11.1

  # Weather
  weather: ^3.1.1

  # Animations
  animate_do: ^5.1.0
  flutter_staggered_animations: ^1.1.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

